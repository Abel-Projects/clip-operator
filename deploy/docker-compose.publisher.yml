# Optional: run only the TikTok publisher in Docker while the app stays on Vercel.
#
#   docker compose --env-file home-server/tiktok-publisher/.env \
#     -f deploy/docker-compose.publisher.yml up -d --build
#
# SupoClip must run on the host (scripts/start-supoclip.ps1).

services:
  publisher:
    build:
      context: ../home-server/tiktok-publisher
      dockerfile: Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CLIP_OPERATOR_URL: ${CLIP_OPERATOR_URL}
      PUBLISH_AGENT_SECRET: ${PUBLISH_AGENT_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      SUPOCLIP_BASE_URL: ${SUPOCLIP_BASE_URL:-http://host.docker.internal:8000}
      SUPOCLIP_USER_ID: ${SUPOCLIP_USER_ID}
      SUPOCLIP_AUTH_SECRET: ${SUPOCLIP_AUTH_SECRET}
      TIKTOK_ACCOUNT_NAME: ${TIKTOK_ACCOUNT_NAME}
      TIKTOK_COOKIES_PATH: ${TIKTOK_COOKIES_PATH:-}
      POLL_INTERVAL_SEC: "${POLL_INTERVAL_SEC:-300}"
      UPLOAD_TIMEOUT_SEC: "${UPLOAD_TIMEOUT_SEC:-120}"
    volumes:
      - publisher-cookies:/publisher/vendor/TiktokAutoUploader/CookiesDir

volumes:
  publisher-cookies:
