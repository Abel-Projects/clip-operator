# Self-hosted Clip Operator stack for a Linux home server.
#
#   docker compose --env-file ../.env.local up -d --build
#
# This runs the dashboard/app and an internal cron loop that drives autopilot.
# SupoClip and the TikTok publisher agent run alongside this (see deploy/README.md):
#   - SupoClip: its own docker project (reachable at SUPOCLIP_BASE_URL)
#   - Publisher: home-server/tiktok-publisher (needs Playwright + TikTok cookies)

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CRON_SECRET: ${CRON_SECRET}
      APP_PASSWORD: ${APP_PASSWORD}
      SUPOCLIP_BASE_URL: ${SUPOCLIP_BASE_URL}
      SUPOCLIP_FRONTEND_URL: ${SUPOCLIP_FRONTEND_URL}
      SUPOCLIP_USER_ID: ${SUPOCLIP_USER_ID}
      SUPOCLIP_AUTH_SECRET: ${SUPOCLIP_AUTH_SECRET}
      PUBLISH_AGENT_SECRET: ${PUBLISH_AGENT_SECRET}
      WAYINVIDEO_API_KEY: ${WAYINVIDEO_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/wayinvideo/config"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Drives the autopilot state machine (replaces Vercel cron).
  cron:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET}
      CRON_INTERVAL_SEC: "${CRON_INTERVAL_SEC:-180}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          curl -fsS -X POST "http://app:3000/api/cron/autopilot" -H "Authorization: Bearer $${CRON_SECRET}" || echo "cron tick failed"
          sleep "$${CRON_INTERVAL_SEC}"
        done
